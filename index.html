<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Kettle PUI — State Demo</title>
    <style>
      :root {
        --bg: #f3f7f8;
        --text: #38414a;
        --muted: #66717a;
        --stroke: #b8c4cc;
        --button-bg: rgba(255, 255, 255, 0.78);
        --active: #37d3cc;
        --led-color: #37d3cc;
        --led-shadow: rgba(55, 211, 204, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e8eef1;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
      }

      .app {
        width: 595px;
        height: 842px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #f7fafb 0%, #eef3f5 100%);
        border-radius: 22px;
        box-shadow: 0 24px 70px rgba(27, 38, 46, 0.16);
      }

      .state-list {
        position: absolute;
        left: 26px;
        top: 128px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        z-index: 3;
      }

      .state-button {
        min-height: 60px;
        padding: 0 20px;
        border: 1.5px solid var(--stroke);
        border-radius: 15px;
        background: var(--button-bg);
        color: var(--text);
        font-size: 24px;
        line-height: 1;
        font-weight: 400;
        letter-spacing: -0.04em;
        cursor: pointer;
        transition:
          background 180ms ease,
          color 180ms ease,
          border-color 180ms ease,
          transform 180ms ease,
          box-shadow 180ms ease;
        box-shadow: 0 2px 0 rgba(255, 255, 255, 0.7) inset;
      }

      .state-button:hover {
        transform: translateY(-1px);
        box-shadow:
          0 12px 24px rgba(34, 48, 58, 0.08),
          0 2px 0 rgba(255, 255, 255, 0.8) inset;
      }

      .state-button.active {
        background: var(--active);
        border-color: var(--active);
        color: #ffffff;
        box-shadow: 0 13px 30px
          color-mix(in srgb, var(--active) 28%, transparent);
      }

      .state-button[data-state="OFF"].active {
        background: #242629;
        border-color: #242629;
      }

      .state-button[data-state="ERROR_NO_WATER"],
      .state-button[data-state="ERROR_OVERHEAT"] {
        letter-spacing: -0.06em;
      }

      .device {
        position: absolute;
        top: 20px;
        left: 273px;
        width: 245px;
        height: 300px;
        z-index: 2;
      }

      .kettle-svg {
        width: 245px;
        height: auto;
        display: block;
        overflow: visible;
      }

      .led-indicator {
        fill: var(--led-color) !important;
        filter: drop-shadow(0 0 11px var(--led-shadow))
          drop-shadow(0 0 28px var(--led-shadow));
        transform-box: fill-box;
        transform-origin: center;
        transition:
          fill 220ms ease,
          filter 220ms ease,
          opacity 220ms ease;
      }

      .description {
        position: absolute;
        left: 275px;
        top: 348px;
        width: 270px;
        font-size: 21px;
        line-height: 1.18;
        letter-spacing: -0.04em;
        font-weight: 400;
        color: #3f454b;
        z-index: 2;
      }

      .control-bar {
        position: absolute;
        right: 24px;
        bottom: 22px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 5;
        opacity: 0.72;
      }

      .control-bar:hover {
        opacity: 1;
      }

      .mini-control,
      .state-select {
        height: 36px;
        border: 1px solid var(--stroke);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        padding: 0 10px;
        outline: none;
        cursor: pointer;
      }

      .sound-toggle {
        position: absolute;
        left: 26px;
        bottom: 22px;
        height: 36px;
        padding: 0 12px;
        border: 1px solid var(--stroke);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        z-index: 5;
        opacity: 0.72;
      }

      .sound-toggle:hover {
        opacity: 1;
      }

      .hint {
        position: absolute;
        left: 26px;
        bottom: 64px;
        font-size: 12px;
        color: #7d8992;
        letter-spacing: -0.02em;
        opacity: 0.85;
      }

      .app.state-off {
        --active: #242629;
        --led-color: #2a2a2a;
        --led-shadow: rgba(0, 0, 0, 0.08);
      }

      .app.state-idle {
        --active: #39d4cc;
        --led-color: #39d4cc;
        --led-shadow: rgba(57, 212, 204, 0.48);
      }

      .app.state-heating {
        --active: #ff9f1c;
        --led-color: #ff9f1c;
        --led-shadow: rgba(255, 159, 28, 0.48);
      }

      .app.state-ready {
        --active: #29d365;
        --led-color: #29d365;
        --led-shadow: rgba(41, 211, 101, 0.5);
      }

      .app.state-keep_warm {
        --active: #2f80ed;
        --led-color: #2f80ed;
        --led-shadow: rgba(47, 128, 237, 0.48);
      }

      .app.state-error_no_water {
        --active: #ff5129;
        --led-color: #ff5129;
        --led-shadow: rgba(255, 81, 41, 0.5);
      }

      .app.state-error_overheat {
        --active: #ff1f2d;
        --led-color: #ff1f2d;
        --led-shadow: rgba(255, 31, 45, 0.56);
      }

      .app.state-heating .led-indicator {
        animation: heatingBreath 2s ease-in-out infinite;
      }

      .app.state-ready .led-indicator {
        animation: readyConfirm 720ms ease-out 1;
      }

      .app.state-keep_warm .led-indicator {
        animation: keepWarmPulse 5s ease-in-out infinite;
      }

      .app.state-error_no_water .led-indicator {
        animation: noWaterWarning 2.6s linear infinite;
      }

      .app.state-error_overheat .led-indicator {
        animation: overheatWarning 2.5s linear infinite;
      }

      @keyframes heatingBreath {
        0%,
        100% {
          opacity: 0.62;
          transform: scale(0.94);
          filter: drop-shadow(0 0 6px rgba(255, 159, 28, 0.28))
            drop-shadow(0 0 18px rgba(255, 159, 28, 0.26));
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
          filter: drop-shadow(0 0 18px rgba(255, 159, 28, 0.68))
            drop-shadow(0 0 42px rgba(255, 159, 28, 0.46));
        }
      }

      @keyframes readyConfirm {
        0%,
        18% {
          opacity: 1;
          transform: scale(1.12);
          filter: drop-shadow(0 0 22px rgba(41, 211, 101, 0.85))
            drop-shadow(0 0 54px rgba(41, 211, 101, 0.58));
        }
        19%,
        39% {
          opacity: 0.62;
          transform: scale(0.96);
        }
        40%,
        58% {
          opacity: 1;
          transform: scale(1.12);
          filter: drop-shadow(0 0 22px rgba(41, 211, 101, 0.85))
            drop-shadow(0 0 54px rgba(41, 211, 101, 0.58));
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes keepWarmPulse {
        0%,
        100% {
          opacity: 0.7;
          transform: scale(0.97);
          filter: drop-shadow(0 0 8px rgba(47, 128, 237, 0.28))
            drop-shadow(0 0 22px rgba(47, 128, 237, 0.22));
        }
        50% {
          opacity: 1;
          transform: scale(1.035);
          filter: drop-shadow(0 0 16px rgba(47, 128, 237, 0.5))
            drop-shadow(0 0 36px rgba(47, 128, 237, 0.34));
        }
      }

      @keyframes noWaterWarning {
        0%,
        13% {
          opacity: 1;
          transform: scale(1.06);
          filter: drop-shadow(0 0 18px rgba(255, 81, 41, 0.72))
            drop-shadow(0 0 46px rgba(255, 81, 41, 0.44));
        }
        14%,
        24% {
          opacity: 0.58;
          transform: scale(0.96);
        }
        25%,
        30% {
          opacity: 1;
          transform: scale(1.04);
        }
        31%,
        40% {
          opacity: 0.58;
          transform: scale(0.96);
        }
        41%,
        46% {
          opacity: 1;
          transform: scale(1.04);
        }
        47%,
        100% {
          opacity: 0.64;
          transform: scale(0.97);
        }
      }

      @keyframes overheatWarning {
        0%,
        4% {
          opacity: 1;
          transform: scale(1.08);
          filter: drop-shadow(0 0 22px rgba(255, 31, 45, 0.84))
            drop-shadow(0 0 50px rgba(255, 31, 45, 0.52));
        }
        5%,
        8% {
          opacity: 0.5;
          transform: scale(0.95);
        }
        9%,
        13% {
          opacity: 1;
          transform: scale(1.08);
        }
        14%,
        17% {
          opacity: 0.5;
          transform: scale(0.95);
        }
        18%,
        22% {
          opacity: 1;
          transform: scale(1.08);
        }
        23%,
        100% {
          opacity: 0.62;
          transform: scale(0.96);
        }
      }

      @media (max-width: 640px) {
        body {
          place-items: start center;
          background: #f3f7f8;
        }

        .app {
          transform-origin: top center;
          transform: scale(min(1, calc(100vw / 595)));
          border-radius: 0;
        }
      }
    </style>
  </head>

          text: "Пристрій вимкнений. Індикація неактивна, чайник не реагує на START.",
          sound: [],
        },
        {
          id: "IDLE",
          css: "state-idle",
          text: "Чайник увімкнений і готовий до запуску. М’яке світло показує, що пристрій очікує дію користувача.",
          sound: [{ start: 0, duration: 0.09, frequency: 900 }],
        },
        {
          id: "HEATING",
          css: "state-heating",
          text: "Вода нагрівається. Плавне breathing-світло показує активний процес без тривожного звуку.",
          sound: [{ start: 0, duration: 0.09, frequency: 950 }],
        },
        {
          id: "READY",
          css: "state-ready",
          text: "Вода готова. Чайник підтверджує завершення двома короткими сигналами та світловим спалахом.",
          sound: [
            { start: 0, duration: 0.1, frequency: 1100 },
            { start: 0.2, duration: 0.1, frequency: 1100 },
          ],
        },
        {
          id: "KEEP_WARM",
          css: "state-keep_warm",
          text: "Чайник підтримує температуру. Повільний спокійний пульс показує, що пристрій працює у фоновому режимі.",
          sound: [],
        },
        {
          id: "ERROR_NO_WATER",
          css: "state-error_no_water",
          text: "Недостатньо води для нагріву. Користувачу потрібно додати воду і натиснути START.",
          sound: [
            { start: 0, duration: 0.34, frequency: 650 },
            { start: 0.65, duration: 0.12, frequency: 750 },
            { start: 1.05, duration: 0.12, frequency: 750 },
          ],
          repeat: 2.6,
        },
        {
          id: "ERROR_OVERHEAT",
          css: "state-error_overheat",
          text: "Перегрів. Чайник блокує нормальний процес, доки температура не стане безпечною.",
          sound: [
            { start: 0, duration: 0.09, frequency: 1400 },
            { start: 0.22, duration: 0.09, frequency: 1400 },
            { start: 0.44, duration: 0.09, frequency: 1400 },
          ],
          repeat: 2.5,
        },
      ];

      const app = document.getElementById("app");
      const buttons = [...document.querySelectorAll(".state-button")];
      const description = document.getElementById("description");
      const stateSelect = document.getElementById("stateSelect");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const soundToggle = document.getElementById("soundToggle");

      let currentIndex = 1;
      let audioContext = null;
      let soundEnabled = true;
      let repeatTimer = null;

      function getStateIndex(stateId) {
        return states.findIndex((state) => state.id === stateId);
      }

      function ensureAudioContext() {
        if (!audioContext) {
          audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
      }

      function stopRepeatingSound() {
        if (repeatTimer) {
          clearInterval(repeatTimer);
          repeatTimer = null;
        }
      }

      function playTone(delay, duration, frequency, gainValue = 0.055) {
        if (!soundEnabled) return;
        ensureAudioContext();

        const startAt = audioContext.currentTime + delay;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, startAt);

        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start(startAt);
        oscillator.stop(startAt + duration + 0.025);
      }

      function playPattern(state) {
        if (!state.sound || state.sound.length === 0 || !soundEnabled) return;

        state.sound.forEach((item) => {
          playTone(item.start, item.duration, item.frequency);
        });
      }

      function runStateSound(state) {
        stopRepeatingSound();
        playPattern(state);

        if (state.repeat) {
          repeatTimer = setInterval(() => {
            playPattern(state);
          }, state.repeat * 1000);
        }
      }

      function setState(stateId, playSound = true) {
        const index = getStateIndex(stateId);
        if (index === -1) return;

        currentIndex = index;
        const state = states[currentIndex];

        app.className = `app ${state.css}`;
        description.textContent = state.text;
        stateSelect.value = state.id;

        buttons.forEach((button) => {
          button.classList.toggle("active", button.dataset.state === state.id);
        });

        const led = document.querySelector(".led-indicator");
        if (led) {
          led.style.animation = "none";
          led.getBoundingClientRect();
          led.style.animation = "";
        }

        console.log("STATE:" + state.id);

        if (playSound) {
          runStateSound(state);
        } else {
          stopRepeatingSound();
        }
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          setState(button.dataset.state, true);
        });
      });

      stateSelect.addEventListener("change", () => {
        setState(stateSelect.value, true);
      });

      prevBtn.addEventListener("click", () => {
        const nextIndex = (currentIndex - 1 + states.length) % states.length;
        setState(states[nextIndex].id, true);
      });

      nextBtn.addEventListener("click", () => {
        const nextIndex = (currentIndex + 1) % states.length;
        setState(states[nextIndex].id, true);
      });

      soundToggle.addEventListener("click", () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
        if (!soundEnabled) {
          stopRepeatingSound();
        } else {
          runStateSound(states[currentIndex]);
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.target.tagName === "SELECT") return;

        const keyIndex = Number(event.key) - 1;
        if (keyIndex >= 0 && keyIndex < states.length) {
          setState(states[keyIndex].id, true);
        }

        if (event.key === "ArrowLeft") {
          prevBtn.click();
        }

        if (event.key === "ArrowRight") {
          nextBtn.click();
        }
      });

      // Initial visual state without autoplay sound.
      setState("IDLE", false);
    </script>
  </body>
</html>
